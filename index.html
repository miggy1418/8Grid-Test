<head>
  <title>Word 8 Grid Experiment</title>
 <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      min-height: 100dvh;

      background-image: url('bg.png');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;

      font-family: Arial, sans-serif;

      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;

      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 600px;
    }

    .container img {
      width: 100%;
      max-width: 600px;
      height: auto;
    }

      color: #ccc;

      font-size: 16px;
      width: 90%;
      max-width: 300px;
      box-sizing: border-box;
    }

    button {
      padding: 10px;
      font-size: 16px;
      margin-top: 10px;
      cursor: pointer;
    }

    .words {
      color: #ccc;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .words ul {
      list-style: none;
      padding: 0;
      margin: 10px 0 0 0;

      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;

      color: #ccc;
    }
  </style>
</head>

    clearInterval(countdown);

  let obj = {};
  for (let c of word) {

  }
  return obj;
}

function isValidLetters(word) {
  let temp = {...baseCount};

    if (!temp[c]) return false;

function isRealWord(word) {
  return dictionary.includes(word);
}

/* ========== GAME LOGIC ========== */
let used = new Set();

function addWord() {
  let input = document.getElementById("wordInput");
  let word = input.value.toLowerCase().trim();

  if (word.length < 3) {
    alert("Minimum 3 letters!");
    return;
  }

  if (!isValidLetters(word)) {
    alert("Invalid letters!");
    input.value = "";
    return;
  }

  if (!isRealWord(word)) {
    alert("Not in dictionary!");
    input.value = "";
    return;
  }

  if (used.has(word)) {
    alert("Already used!");
    return;
  }

  used.add(word);

  let li = document.createElement("li");
  li.textContent = word;
  document.getElementById("list").appendChild(li);

  input.value = "";
}

document.getElementById("wordInput").addEventListener("keypress", e => {
  if (e.key === "Enter") addWord();
});
